name: "Issue AI-less Classifier"

on:
  issues:
    types: [opened, edited]
  workflow_dispatch: # Allows you to manually trigger a sweep of all existing open issues

jobs:
  label-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Analyze Content and Apply Labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          SINGLE_ISSUE_NUM: ${{ github.event.issue.number }}
          SINGLE_TITLE: ${{ github.event.issue.title }}
          SINGLE_BODY: ${{ github.event.issue.body }}
        run: |
          import os, sys, re, json, urllib.request

          token = os.getenv('GITHUB_TOKEN')
          repo = os.getenv('REPO')
          event_name = os.getenv('EVENT_NAME')

          # Keyword rules matching your exact GSSoC labels
          rules = {
              "type:bug": [r"bug", r"crash", r"error", r"fail", r"broken", r"except", r"issue", r"not working", r"wrong"],
              "type:performance": [r"slow", r"performance", r"latency", r"optimize", r"speed", r"memory leak", r"fast", r"timeout"],
              "type:refactor": [r"refactor", r"clean code", r"structure", r"rewrite", r"simplify", r"cleanup"],
              "type:accessibility": [r"accessibility", r"a11y", r"contrast", r"screen reader", r"aria", r"alt text", r"font size", r"keyboard nav"],
              "type:docs": [r"doc", r"readme", r"comment", r"typo", r"guide", r"contributing", r"wiki"],
              "type:testing": [r"test", r"pytest", r"unittest", r"coverage", r"mock", r"assert"],
              "type:devops": [r"ci/cd", r"workflow", r"docker", r"yaml", r"action", r"pipeline", r"setup", r"deploy"],
              "type:feature": [r"feature", r"add", r"request", r"create", r"implement", r"new idea", r"enhance"]
          }

          def get_labels_for_text(title, body):
              full_text = f"{title or ''} {body or ''}".lower()
              matched_labels = []
              for label, patterns in rules.items():
                  for pattern in patterns:
                      if re.search(pattern, full_text):
                          matched_labels.append(label)
                          break
              return matched_labels if matched_labels else ["triage"]

          def apply_labels_to_github(issue_num, labels):
              url = f"https://api.github.com/repos/{repo}/issues/{issue_num}/labels"
              req = urllib.request.Request(
                  url, 
                  data=json.dumps({"labels": labels}).encode(),
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
              )
              try:
                  urllib.request.urlopen(req)
                  print(f"Successfully applied tags {labels} to Issue #{issue_num}")
              except Exception as e:
                  print(f"Error applying labels to Issue #{issue_num}: {e}")

          # ---- EXECUTION ROUTINE ----
          if event_name == "workflow_dispatch":
              print("🔄 Manual Sweep Triggered: Fetching all existing open issues...")
              list_url = f"https://api.github.com/repos/{repo}/issues?state=open&per_page=100"
              req = urllib.request.Request(list_url, headers={"Authorization": f"Bearer {token}"})
              try:
                  with urllib.request.urlopen(req) as response:
                      issues = json.loads(response.read().decode())
                      for issue in issues:
                          # Skip Pull Requests (GitHub API listings mix them with issues)
                          if "pull_request" in issue:
                              continue
                          
                          issue_num = issue["number"]
                          labels = get_labels_for_text(issue["title"], issue["body"])
                          apply_labels_to_github(issue_num, labels)
              except Exception as e:
                  print(f"Failed to fetch backlog: {e}")
                  sys.exit(1)
          else:
              issue_num = os.getenv('SINGLE_ISSUE_NUM')
              title = os.getenv('SINGLE_TITLE')
              body = os.getenv('SINGLE_BODY')
              labels = get_labels_for_text(title, body)
              apply_labels_to_github(issue_num, labels)
        shell: python