apiVersion: v1
kind: Secret
metadata:
  name: aegis-secret
  namespace: aegis
  labels:
    app: aegisgraph-sentinel
type: Opaque
data:
  # Base64 encoded values for production secrets (replace in real CD environment)
  # echo -n 'password' | base64
  NEO4J_PASSWORD: cGFzc3dvcmQ= # "password"
  JWT_SECRET: c3VwZXJzZWNyZXRqd3RzZWNyZXRrZXk= # "supersecretjwtsecretkey"
  AEGIS_API_KEY_HASHES: dGVzdC1oYXNoLTEsdGVzdC1oYXNoLTI= # "test-hash-1,test-hash-2"
